<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Dashboard</title>
    <style>
        :root {
            --admin: #dc2626; --admin-dark: #b91c1c; --bg: #f8fafc;
            --card: rgba(255,255,255,0.92); --text: #0f172a; --muted: #64748b;
            --border: #e2e8f0; --success: #10b981; --error: #ef4444;
            --shadow: 0 12px 32px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { background: linear-gradient(135deg, #fee2e2 0%, #f8fafc 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; color: var(--text); }
        .container { width: 100%; max-width: 1100px; background: var(--card); backdrop-filter: blur(10px); border-radius: 18px; box-shadow: var(--shadow); padding: 2.5rem; border: 1px solid rgba(255,255,255,0.7); }
        
        #admin-login-view, #admin-dashboard-view { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        h2 { font-size: 1.75rem; margin-bottom: 0.4rem; background: linear-gradient(135deg, var(--admin), #ea580c); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .subtitle { color: var(--muted); margin-bottom: 1.8rem; font-size: 0.95rem; text-align:center; }
        
        form { display: flex; flex-direction: column; gap: 1rem; max-width: 380px; margin: 0 auto; }
        input { padding: 0.9rem 1rem; border: 1px solid var(--border); border-radius: 10px; font-size: 0.95rem; background: #fff; transition: 0.2s; }
        input:focus { outline: none; border-color: var(--admin); box-shadow: 0 0 0 3px rgba(220,38,38,0.15); }
        button { padding: 0.85rem; background: linear-gradient(135deg, var(--admin), var(--admin-dark)); color: #fff; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.95rem; }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(220,38,38,0.25); }
        button:active:not(:disabled) { transform: translateY(0); }
        button:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .card { background: #fafafa; padding: 1.4rem; border-radius: 12px; margin-bottom: 1.2rem; border: 1px solid var(--border); }
        .card h3 { margin-bottom: 1rem; color: var(--text); display: flex; justify-content: space-between; align-items: center; font-size: 1.15rem; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.88rem; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        th, td { padding: 0.8rem 0.9rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #f1f5f9; color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.4px; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(220,38,38,0.03); }
        
        .msg { margin-top: 0.7rem; font-size: 0.88rem; font-weight: 500; min-height: 1.2rem; text-align:center; }
        .msg.success { color: var(--success); }
        .msg.error { color: var(--error); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.8rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; flex-wrap: wrap; gap: 12px; }
        .logout-btn { background: transparent; color: var(--error); border: 1px solid var(--error); padding: 0.5rem 1rem; font-size: 0.85rem; border-radius: 8px; margin-left: auto; }
        .logout-btn:hover { background: #fef2f2; transform: none; }
        .refresh-btn { background: #3b82f6; padding: 0.5rem 0.9rem; font-size: 0.85rem; border-radius: 8px; margin-right: 10px; }
        .refresh-btn:hover { background: #2563eb; }
        .mono { font-family: monospace; background: #fef2f2; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; color: #991b1b; }
        .badge { background: #fee2e2; color: var(--admin); padding: 3px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
        
        @media (max-width: 850px) { .container { padding: 1.5rem; overflow-x:auto; } table { min-width: 650px; } th, td { padding: 0.6rem; font-size: 0.8rem; } .header { flex-direction: column; align-items: flex-start; } }
    </style>
</head>
<body>
    <div class="container">
        <!-- ADMIN LOGIN GATE -->
        <div id="admin-login-view">
            <h2>🛡️ Admin Direct Login</h2>
            <p class="subtitle">Authorized access only. Enter credentials to view system data.</p>
            <form id="admin-login-form" autocomplete="off">
                <input type="text" id="admin-user" placeholder="Admin Username" required>
                <input type="password" id="admin-pass" placeholder="Password" required>
                <button type="submit" id="admin-login-btn">Access Dashboard</button>
            </form>
            <div id="admin-login-msg" class="msg"></div>
        </div>

        <!-- ADMIN DASHBOARD -->
        <div id="admin-dashboard-view" style="display:none;">
            <div class="header">
                <h2>📊 Admin Control Panel</h2>
                <div>
                    <button id="refresh-btn" class="refresh-btn">🔄 Refresh Data</button>
                    <a href="/logout" class="logout-btn">Logout</a>
                </div>
            </div>

            <div class="card">
                <h3>A. User Credentials <span class="badge">SYSTEM</span></h3>
                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr><th>Username</th><th>Password</th></tr></thead>
                        <tbody id="creds-body"><tr><td colspan="2" style="text-align:center; padding:1.2rem; color:#94a3b8;">Loading credentials...</td></tr></tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <h3>B. Submitted Requests <span class="badge">LIVE</span></h3>
                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr><th>ID</th><th>User</th><th>Name</th><th>Mobile</th><th>Email</th><th>Password</th><th>Timestamp</th></tr></thead>
                        <tbody id="reqs-body"><tr><td colspan="7" style="text-align:center; padding:1.2rem; color:#94a3b8;">Fetching records...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const adminLoginView = document.getElementById('admin-login-view');
        const adminDashView = document.getElementById('admin-dashboard-view');
        const adminForm = document.getElementById('admin-login-form');
        const adminMsg = document.getElementById('admin-login-msg');

        async function checkAdminAuth() {
            try {
                const res = await fetch('/api/admin/data');
                if (res.status === 200) {
                    adminLoginView.style.display = 'none';
                    adminDashView.style.display = 'block';
                    loadAdminData();
                } else {
                    adminLoginView.style.display = 'block';
                    adminDashView.style.display = 'none';
                }
            } catch { adminLoginView.style.display = 'block'; }
        }

        adminForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('admin-login-btn');
            btn.disabled = true; btn.textContent = 'Verifying...';
            adminMsg.className = 'msg'; adminMsg.textContent = '';

            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('admin-user').value,
                        password: document.getElementById('admin-pass').value
                    })
                });
                const data = await res.json();
                if (data.success) {
                    adminMsg.className = 'msg success';
                    adminMsg.textContent = '✅ Access Granted! Loading Dashboard...';
                    setTimeout(checkAdminAuth, 1000);
                } else {
                    adminMsg.className = 'msg error';
                    adminMsg.textContent = '❌ Invalid Admin Credentials';
                }
            } catch {
                adminMsg.className = 'msg error';
                adminMsg.textContent = '❌ Connection Failed';
            }
            btn.disabled = false; btn.textContent = 'Access Dashboard';
        });

        async function loadAdminData() {
            const credsBody = document.getElementById('creds-body');
            const reqsBody = document.getElementById('reqs-body');
            credsBody.innerHTML = '<tr><td colspan="2" style="text-align:center; padding:1rem;">Syncing...</td></tr>';
            reqsBody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:1rem;">Syncing...</td></tr>';

            try {
                const res = await fetch('/api/admin/data');
                const data = await res.json();
                if (data.error) return;

                credsBody.innerHTML = data.users.length ? 
                    data.users.map(u => `<tr><td style="font-weight:600;">${u.username}</td><td><span class="mono">${u.password}</span></td></tr>`).join('') :
                    '<tr><td colspan="2" style="text-align:center; color:#94a3b8;">No accounts found.</td></tr>';

                reqsBody.innerHTML = data.requests.length ?
                    data.requests.map(r => `<tr><td>#${r.id}</td><td>${r.username}</td><td>${r.name}</td><td>${r.mobile}</td><td>${r.email}</td><td><span class="mono">${r.form_password}</span></td><td style="color:#64748b; font-size:0.82em;">${new Date(r.timestamp).toLocaleString()}</td></tr>`).join('') :
                    '<tr><td colspan="7" style="text-align:center; color:#94a3b8;">No requests submitted yet.</td></tr>';
            } catch {
                credsBody.innerHTML = '<tr><td colspan="2" style="text-align:center; color:#ef4444;">Failed to load</td></tr>';
                reqsBody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#ef4444;">Failed to load</td></tr>';
            }
        }

        document.getElementById('refresh-btn').addEventListener('click', loadAdminData);
        checkAdminAuth();
    </script>
</body>
</html>
