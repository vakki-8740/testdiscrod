<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Panel</title>
    <style>
        :root { --primary: #2563eb; --primary-hover: #1d4ed8; --bg: #f1f5f9; --card: #ffffff; 
                --text: #1e293b; --muted: #64748b; --border: #e2e8f0; --success: #16a34a; --error: #dc2626; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 700px; background: var(--card); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: var(--text); margin-bottom: 1rem; font-size: 1.5rem; }
        .hidden { display: none !important; }
        form { display: flex; flex-direction: column; gap: 12px; margin-bottom: 1rem; }
        input { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: #fff; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        button { padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; }
        button:hover:not(:disabled) { background: var(--primary-hover); }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        .msg { margin-top: 8px; font-size: 14px; min-height: 20px; }
        .msg.error { color: var(--error); }
        .msg.success { color: var(--success); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        .logout-btn { background: var(--error); font-size: 13px; padding: 8px 16px; }
        .logout-btn:hover { background: #b91c1c; }
        .card-box { background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); }
        .card-box h3 { margin-bottom: 12px; color: var(--text); font-size: 1.1rem; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: left; }
        th { background: #f8fafc; color: var(--muted); font-weight: 600; }
        .scroll-table { overflow-x: auto; margin-top: 10px; }
        @media (max-width: 500px) { .container { padding: 1.2rem; } th, td { padding: 8px; font-size: 12px; } }
    </style>
</head>
<body>
    <div class="container">
        <!-- 🔒 LOGIN SECTION (Default Visible) -->
        <div id="login-section">
            <h2>🔐 User Login</h2>
            <form id="login-form" autocomplete="off">
                <input type="text" id="login-user" placeholder="Username" required>
                <input type="password" id="login-pass" placeholder="Password" required>
                <button type="submit" id="login-btn">Login</button>
            </form>
            <div id="login-msg" class="msg"></div>
        </div>

        <!-- 📊 DASHBOARD SECTION (Hidden Initially) -->
        <div id="dashboard-section" class="hidden">
            <div class="header">
                <h2 id="welcome-msg">👋 Welcome</h2>
                <button id="logout-btn" class="logout-btn">Logout</button>
            </div>

            <div class="card-box">
                <h3>📝 Submit Request</h3>
                <form id="request-form" autocomplete="off">
                    <input type="text" id="req-name" placeholder="Full Name" required>
                    <input type="text" id="req-mobile" placeholder="Mobile No." required>
                    <input type="email" id="req-email" placeholder="Email ID" required>
                    <input type="password" id="req-pass" placeholder="Password" required>
                    <button type="submit" id="submit-btn">Submit Request</button>
                </form>
                <div id="submit-msg" class="msg"></div>
            </div>

            <div>
                <h3>📬 Mailbox (Your Requests)</h3>
                <div class="scroll-table">
                    <table>
                        <thead><tr><th>Name</th><th>Mobile</th><th>Email</th><th>Password</th><th>Time</th></tr></thead>
                        <tbody id="mailbox-body"><tr><td colspan="5" style="text-align:center; color:#666;">Loading...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM References
        const loginSec = document.getElementById('login-section');
        const dashSec = document.getElementById('dashboard-section');
        const loginForm = document.getElementById('login-form');
        const reqForm = document.getElementById('request-form');
        const loginMsg = document.getElementById('login-msg');
        const submitMsg = document.getElementById('submit-msg');

        // 1. LOGIN HANDLER
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;

            btn.disabled = true; btn.textContent = 'Checking...';
            loginMsg.className = 'msg'; loginMsg.textContent = '';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();

                if (data.success) {
                    loginMsg.className = 'msg success';
                    loginMsg.textContent = '✅ Login Successful!';
                    setTimeout(() => {
                        loginSec.classList.add('hidden');
                        dashSec.classList.remove('hidden');
                        document.getElementById('welcome-msg').textContent = '👋 Welcome, ' + user;
                        loadMailbox();
                    }, 500);
                } else {
                    loginMsg.className = 'msg error';
                    loginMsg.textContent = '❌ ' + (data.message || 'Invalid Credentials');
                }
            } catch {
                loginMsg.className = 'msg error';
                loginMsg.textContent = '❌ Network Error. Is server running?';
            }
            btn.disabled = false; btn.textContent = 'Login';
        });

        // 2. SUBMIT HANDLER
        reqForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.textContent = 'Sending...';
            submitMsg.className = 'msg'; submitMsg.textContent = '';

            try {
                const res = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('req-name').value,
                        mobile: document.getElementById('req-mobile').value,
                        email: document.getElementById('req-email').value,
                        form_password: document.getElementById('req-pass').value
                    })
                });
                const data = await res.json();
                submitMsg.className = data.success ? 'msg success' : 'msg error';
                submitMsg.textContent = data.message || (data.success ? '✅ Submitted!' : '❌ Failed');
                
                if (data.success) {
                    e.target.reset();
                    loadMailbox();
                }
            } catch {
                submitMsg.className = 'msg error';
                submitMsg.textContent = '❌ Submission Failed';
            }
            btn.disabled = false; btn.textContent = 'Submit Request';
        });

        // 3. LOAD MAILBOX
        async function loadMailbox() {
            const tbody = document.getElementById('mailbox-body');
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#666;">Fetching...</td></tr>';
            try {
                const res = await fetch('/api/mailbox');
                const data = await res.json();
                tbody.innerHTML = '';
                if (!data.length) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#666;">No requests found</td></tr>';
                    return;
                }
                data.forEach(r => {
                    tbody.innerHTML += `<tr><td>${r.name}</td><td>${r.mobile}</td><td>${r.email}</td><td>${r.form_password}</td><td>${r.timestamp}</td></tr>`;
                });
            } catch {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">Failed to load</td></tr>';
            }
        }

        // 4. LOGOUT
        document.getElementById('logout-btn').addEventListener('click', () => {
            window.location.href = '/logout';
        });
    </script>
</body>
</html>
